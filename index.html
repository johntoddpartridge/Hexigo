    try {
      var snap = await _fbDb.ref('games/' + key).once('value');

      if (val === null) return null;
      return { key: key, value: val, shared: !!shared };
    } catch(e) { console.error('FB get error:', e); return null; }
  },
  delete: async function(key, shared) {
    try {
      await _fbDb.ref('games/' + key).remove();
      return { key: key, deleted: true, shared: !!shared };
    } catch(e) { return null; }
  },
  list: async function(prefix, shared) {
    try {
      var snap = await _fbDb.ref('games').once('value');
      var data = snap.val() || {};
      var keys = Object.keys(data);
      if (prefix) keys = keys.filter(function(k) { return k.indexOf(prefix) === 0; });
      return { keys: keys, prefix: prefix, shared: !!shared };
    } catch(e) { return null; }
  }
